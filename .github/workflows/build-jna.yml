name: Build JNA Shared Library

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu

    - name: Build for amd64
      if: matrix.arch == 'amd64'
      run: |
        CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -o bot-amd64.so ./cmd/cloudflared

    - name: Build for arm64
      if: matrix.arch == 'arm64'
      run: |
        CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -buildmode=c-shared -o bot-arm64.so ./cmd/cloudflared

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bot-${{ matrix.arch }}.so
        path: bot-${{ matrix.arch }}.so
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/bot-amd64.so/bot-amd64.so
          artifacts/bot-arm64.so/bot-arm64.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-latest:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Update latest release
      uses: softprops/action-gh-release@v1
      with:
        name: Latest
        tag_name: latest
        files: |
          artifacts/bot-amd64.so/bot-amd64.so
          artifacts/bot-arm64.so/bot-arm64.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
